<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <title>403 — VideoStream</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a0a; color: #fff;
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center; padding: 2rem;
    }
    .code { font-family: 'Bebas Neue', sans-serif; font-size: 8rem; color: #E50914; line-height: 1; letter-spacing: 4px; }
    h1 { font-size: 1.5rem; margin: 1rem 0 0.5rem; }
    p { color: #b3b3b3; font-size: 0.95rem; margin-bottom: 2rem; }
    a {
      background: #E50914; color: #fff; text-decoration: none;
      padding: 0.7rem 1.8rem; border-radius: 4px; font-weight: 600; font-size: 0.9rem;
    }
    a:hover { background: #b0060f; }
  </style>
</head>
<body>
  <div class="code">403</div>
  <h1>Access Denied</h1>
  <p>You don't have permission to access this page.</p>
  <a href="/">← Go Home</a>
</body>
</html>
