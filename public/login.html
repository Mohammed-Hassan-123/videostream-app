<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Sign In — VideoStream</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0a0a0a; --dark: #141414; --card: #1a1a1a;
      --border: #2a2a2a; --red: #E50914; --red-dark: #b0060f;
      --white: #ffffff; --gray: #b3b3b3;
    }
    body {
      background: var(--black);
      color: var(--white);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
    }

    header {
      padding: 1.5rem 4rem;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.8rem; color: var(--red);
      letter-spacing: 3px; text-decoration: none;
    }

    .page {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 3rem 1rem;
      position: relative;
      overflow: hidden;
    }
    .page-bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 50% 0%, rgba(229,9,20,0.08) 0%, transparent 60%);
    }

    .auth-box {
      position: relative; z-index: 2;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 2.5rem;
      width: 100%; max-width: 420px;
    }

    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      margin-bottom: 2rem;
    }
    .tab {
      flex: 1;
      padding: 0.75rem;
      text-align: center;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
      color: var(--gray);
      border-bottom: 2px solid transparent;
      transition: all 0.2s;
      background: none; border-top: none; border-left: none; border-right: none;
      font-family: 'DM Sans', sans-serif;
    }
    .tab.active { color: var(--white); border-bottom-color: var(--red); }

    .form-group { margin-bottom: 1.2rem; }
    label { display: block; font-size: 0.82rem; color: var(--gray); margin-bottom: 0.4rem; letter-spacing: 0.5px; text-transform: uppercase; }
    input[type=text], input[type=password] {
      width: 100%;
      background: #111;
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.75rem 1rem;
      color: var(--white);
      font-size: 0.95rem;
      font-family: 'DM Sans', sans-serif;
      transition: border-color 0.2s;
      outline: none;
    }
    input:focus { border-color: rgba(229,9,20,0.6); }

    .btn-submit {
      width: 100%;
      background: var(--red);
      color: var(--white);
      border: none;
      padding: 0.85rem;
      border-radius: 5px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }
    .btn-submit:hover { background: var(--red-dark); }
    .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

    .btn-back {
      width: 100%;
      background: transparent;
      color: var(--gray);
      border: 1px solid var(--border);
      padding: 0.75rem;
      border-radius: 5px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      transition: all 0.2s;
      margin-top: 0.75rem;
      text-decoration: none;
      display: block; text-align: center;
    }
    .btn-back:hover { border-color: var(--white); color: var(--white); }

    .alert {
      padding: 0.75rem 1rem;
      border-radius: 5px;
      font-size: 0.88rem;
      margin-bottom: 1rem;
      display: none;
    }
    .alert-error   { background: rgba(229,9,20,0.15); border: 1px solid rgba(229,9,20,0.4); color: #ff6b6b; }
    .alert-success { background: rgba(46,213,115,0.15); border: 1px solid rgba(46,213,115,0.4); color: #2ed573; }

    .form-panel { display: none; }
    .form-panel.active { display: block; }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">VideoStream</a>
  </header>

  <div class="page">
    <div class="page-bg"></div>
    <div class="auth-box">
      <div class="tabs">
        <button class="tab active" onclick="switchTab('login')">Sign In</button>
        <button class="tab"        onclick="switchTab('signup')">Sign Up</button>
      </div>

      <!-- LOGIN FORM -->
      <div class="form-panel active" id="panel-login">
        <div class="alert alert-error"   id="login-error"></div>
        <div class="alert alert-success" id="login-success"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="login-username" placeholder="Enter your username" autocomplete="username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="Enter your password" autocomplete="current-password"/>
        </div>
        <button class="btn-submit" onclick="doLogin()">Sign In</button>
        <a href="/" class="btn-back">← Back to Home</a>
      </div>

      <!-- SIGNUP FORM -->
      <div class="form-panel" id="panel-signup">
        <div class="alert alert-error"   id="signup-error"></div>
        <div class="alert alert-success" id="signup-success"></div>
        <div class="form-group">
          <label>Username</label>
          <input type="text" id="signup-username" placeholder="Choose a username"/>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="signup-password" placeholder="Choose a password (min 6 chars)"/>
        </div>
        <button class="btn-submit" onclick="doSignup()">Create Account</button>
        <a href="/" class="btn-back">← Back to Home</a>
      </div>
    </div>
  </div>

  <script>
    function switchTab(tab) {
      document.querySelectorAll('.tab').forEach((t, i) => {
        t.classList.toggle('active', (i === 0 && tab === 'login') || (i === 1 && tab === 'signup'));
      });
      document.getElementById('panel-login').classList.toggle('active', tab === 'login');
      document.getElementById('panel-signup').classList.toggle('active', tab === 'signup');
    }

    function showAlert(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      setTimeout(() => el.style.display = 'none', 4000);
    }

    async function doLogin() {
      const username = document.getElementById('login-username').value.trim();
      const password = document.getElementById('login-password').value;
      if (!username || !password) return showAlert('login-error', 'Please fill in all fields');
      const btn = document.querySelector('#panel-login .btn-submit');
      btn.disabled = true; btn.textContent = 'Signing in...';
      try {
        const res = await fetch('/api/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { showAlert('login-error', data.error); btn.disabled = false; btn.textContent = 'Sign In'; return; }
        showAlert('login-success', 'Welcome back! Redirecting...');
        setTimeout(() => window.location.href = '/', 800);
      } catch(e) {
        showAlert('login-error', 'Server error. Try again.'); btn.disabled = false; btn.textContent = 'Sign In';
      }
    }

    async function doSignup() {
      const username = document.getElementById('signup-username').value.trim();
      const password = document.getElementById('signup-password').value;
      if (!username || !password) return showAlert('signup-error', 'Please fill in all fields');
      if (password.length < 6) return showAlert('signup-error', 'Password must be at least 6 characters');
      const btn = document.querySelector('#panel-signup .btn-submit');
      btn.disabled = true; btn.textContent = 'Creating...';
      try {
        const res = await fetch('/api/signup', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });
        const data = await res.json();
        if (!res.ok) { showAlert('signup-error', data.error); btn.disabled = false; btn.textContent = 'Create Account'; return; }
        showAlert('signup-success', 'Account created! Redirecting...');
        setTimeout(() => window.location.href = '/', 800);
      } catch(e) {
        showAlert('signup-error', 'Server error. Try again.'); btn.disabled = false; btn.textContent = 'Create Account';
      }
    }

    // Enter key support
    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') {
        if (document.getElementById('panel-login').classList.contains('active')) doLogin();
        else doSignup();
      }
    });
  </script>
</body>
</html>
