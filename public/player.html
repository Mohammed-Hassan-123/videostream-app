<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Player — VideoStream</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --black: #0a0a0a; --dark: #141414; --card: #1a1a1a;
      --border: #2a2a2a; --red: #E50914; --white: #ffffff; --gray: #b3b3b3;
    }
    body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; }

    header {
      position: sticky; top: 0; z-index: 100;
      background: var(--black); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 3rem; height: 64px;
    }
    .logo { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; color: var(--red); letter-spacing: 3px; text-decoration: none; }
    .btn-sm {
      background: transparent; border: 1px solid var(--border); color: var(--gray);
      padding: 0.35rem 0.9rem; border-radius: 4px; font-size: 0.82rem;
      cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all 0.2s; text-decoration: none;
    }
    .btn-sm:hover { border-color: var(--white); color: var(--white); }

    .page { padding: 2.5rem 3rem; max-width: 1100px; margin: 0 auto; }

    .back-link {
      display: inline-flex; align-items: center; gap: 0.4rem;
      color: var(--gray); text-decoration: none; font-size: 0.88rem;
      margin-bottom: 1.5rem; transition: color 0.2s;
    }
    .back-link:hover { color: var(--white); }

    .player-wrap {
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 1.5rem;
    }
    video {
      width: 100%; display: block;
      max-height: 70vh;
      background: #000;
    }

    .video-info {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 1.5rem;
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 1rem;
    }
    .video-title { font-family: 'Bebas Neue', sans-serif; font-size: 1.6rem; letter-spacing: 1px; }
    .video-meta { color: var(--gray); font-size: 0.85rem; display: flex; gap: 1.5rem; margin-top: 0.4rem; }

    .btn-library {
      background: var(--red); color: var(--white); border: none;
      padding: 0.6rem 1.5rem; border-radius: 4px; font-size: 0.9rem;
      font-weight: 600; cursor: pointer; font-family: 'DM Sans', sans-serif;
      transition: background 0.2s; text-decoration: none; display: inline-block;
    }
    .btn-library:hover { background: #b0060f; }

    #error-msg {
      text-align: center; padding: 5rem; color: var(--gray);
    }
  </style>
</head>
<body>
  <header>
    <a href="/" class="logo">VideoStream</a>
    <div style="display:flex;align-items:center;gap:1rem">
      <span id="header-username" style="color:var(--gray);font-size:0.85rem"></span>
      <button class="btn-sm" onclick="logout()">Sign Out</button>
    </div>
  </header>

  <div class="page">
    <a href="/videos" class="back-link">← Back to Library</a>

    <div id="player-content">
      <div class="player-wrap">
        <video id="video-player" controls preload="metadata"></video>
      </div>
      <div class="video-info">
        <div>
          <div class="video-title" id="video-title">Loading...</div>
          <div class="video-meta">
            <span id="video-size"></span>
            <span id="video-date"></span>
          </div>
        </div>
        <a href="/videos" class="btn-library">← Library</a>
      </div>
    </div>
    <div id="error-msg" style="display:none">
      <div style="font-size:2.5rem;margin-bottom:1rem">⚠</div>
      <p>Video not found or not available.</p>
      <a href="/videos" style="color:var(--red)">← Back to Library</a>
    </div>
  </div>

  <script>
    fetch('/api/me').then(r => r.json()).then(user => {
      if (!user) { window.location.href = '/login'; return; }
      document.getElementById('header-username').textContent = user.username;
    });

    const params = new URLSearchParams(window.location.search);
    const filename = params.get('v');

    if (!filename) {
      document.getElementById('player-content').style.display = 'none';
      document.getElementById('error-msg').style.display = 'block';
    } else {
      fetch('/api/videos').then(r => r.json()).then(videos => {
        const video = videos.find(v => v.filename === filename);
        if (!video) {
          document.getElementById('player-content').style.display = 'none';
          document.getElementById('error-msg').style.display = 'block';
          return;
        }
        document.getElementById('video-title').textContent = video.display_name;
        document.getElementById('video-size').textContent = video.size;
        document.getElementById('video-date').textContent = `Added: ${video.added_date}`;
        document.title = `${video.display_name} — VideoStream`;
        const player = document.getElementById('video-player');
        player.src = `/video/${encodeURIComponent(filename)}`;
        player.onerror = () => {
          document.getElementById('player-content').style.display = 'none';
          document.getElementById('error-msg').style.display = 'block';
        };
      }).catch(() => {
        document.getElementById('player-content').style.display = 'none';
        document.getElementById('error-msg').style.display = 'block';
      });
    }

    function logout() {
      fetch('/api/logout', { method: 'POST' }).then(() => window.location.href = '/');
    }
  </script>
</body>
</html>
