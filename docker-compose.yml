services:
  videostream:
    build: .
    container_name: videostream
    restart: unless-stopped
    expose:
      - "3000"
    volumes:
      - ./logs:/app/logs
    env_file:
      - .env
    networks:
      - internal

  nginx:
    image: nginx:alpine
    container_name: videostream-nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - internal
    depends_on:
      - videostream

networks:
  internal:
    driver: bridge
